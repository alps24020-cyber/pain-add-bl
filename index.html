<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAIN SYSTEM - VERCEL FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            background: #000; 
            font-family: 'Space Grotesk', sans-serif; 
            color: #fff; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
            filter: brightness(0.2);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 10%, #000 150%);
            z-index: -1;
        }

        .card { 
            background: rgba(0, 0, 0, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            backdrop-filter: blur(20px);
            z-index: 10;
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-main {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            margin: 0 auto 1rem;
            display: block;
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 5px;
            outline: none;
        }

        input:focus { border-color: #3b82f6 !important; }

        .btn-primary {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 1rem;
            cursor: pointer;
            border: none;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-box {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .hidden { display: none !important; }
        
        .guide {
            font-size: 10px;
            color: #666;
            margin-top: 1.5rem;
            border-top: 1px solid #222;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://files.catbox.moe/hwaz03.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- LOGIN -->
    <div id="login-page" class="card">
        <img src="https://files.catbox.moe/gxkw8l.jpg" class="logo-main">
        <h2 class="text-center font-bold text-xl mb-1">AUTHENTICATION</h2>
        <p class="text-center text-[10px] text-gray-500 tracking-widest mb-6">PAIN SECURE TERMINAL</p>
        
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="doLogin()" class="btn-primary">Login System</button>
        <p id="login-err" class="text-red-500 text-[10px] mt-2 text-center hidden">Username/Password Salah!</p>
    </div>

    <!-- DASHBOARD -->
    <div id="dash-page" class="card hidden">
        <h2 class="font-bold text-lg mb-4 text-blue-400 italic">DASHBOARD CONTROL</h2>
        
        <div class="mb-4">
            <label class="text-[9px] text-gray-400 uppercase tracking-widest">GitHub Token (GHP)</label>
            <input type="password" id="ghp" placeholder="ghp_xxxxxx">
        </div>

        <div class="mb-4 border-t border-white/5 pt-3">
            <label class="text-[9px] text-gray-400 uppercase tracking-widest">Inject Telegram Token</label>
            <input type="text" id="bot-token" placeholder="8464496080:AAH...">
            <button onclick="runInject()" id="btn-inj" class="btn-primary text-xs">Inject to Database</button>
        </div>

        <div id="status" class="status-box"></div>

        <div class="guide">
            <p class="text-blue-500 font-bold mb-1">PENTING:</p>
            <p>Pastikan Token GHP kamu dicentang bagian <b>"repo"</b> saat dibuat di GitHub Settings agar tidak Gagal Akses.</p>
        </div>

        <button onclick="location.reload()" class="w-full text-[9px] text-gray-600 mt-4 uppercase">Logout</button>
    </div>

    <script>
        const AUTH = { u: "admin", p: "alpscyber" };
        const REPO_INFO = { owner: "alps24020-cyber", repo: "database" };

        function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === AUTH.u && p === AUTH.p) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dash-page').classList.remove('hidden');
            } else {
                document.getElementById('login-err').classList.remove('hidden');
            }
        }

        async function runInject() {
            const token = document.getElementById('ghp').value;
            const tele = document.getElementById('bot-token').value;
            const btn = document.getElementById('btn-inj');
            const status = document.getElementById('status');

            if(!token || !tele) return alert('Isi GHP & Bot Token!');

            btn.disabled = true;
            btn.innerText = "Processing...";
            status.className = "status-box hidden";

            try {
                const url = `https://api.github.com/repos/${REPO_INFO.owner}/${REPO_INFO.repo}/contents/Token`;
                const res = await fetch(url, { headers: { 'Authorization': `token ${token}` }});
                
                if(!res.ok) throw new Error('AKSES GITHUB GAGAL! CEK TOKEN GHP ANDA.');

                const data = await res.json();
                let content = JSON.parse(atob(data.content));
                
                if(content.tokens.includes(tele)) throw new Error('TOKEN SUDAH ADA DI DATABASE!');

                content.tokens.push(tele);

                const update = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Update Database via Web",
                        content: btoa(JSON.stringify(content, null, 2)),
                        sha: data.sha
                    })
                });

                if(update.ok) {
                    status.innerText = "✅ DATA BERHASIL DIINJEKSI!";
                    status.className = "status-box block bg-green-500/20 text-green-400 border border-green-500/50";
                    document.getElementById('bot-token').value = "";
                } else {
                    throw new Error('GAGAL UPDATE FILE!');
                }

            } catch (e) {
                status.innerText = "❌ " + e.message;
                status.className = "status-box block bg-red-500/20 text-red-400 border border-red-500/50";
            } finally {
                btn.disabled = false;
                btn.innerText = "Inject to Database";
            }
        }
    </script>
</body>
</html>
